<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow Guide: Makeup Looks for Every Aesthetic</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="container">
      <header class="site-header">
        <p class="eyebrow">Glow Guide</p>
        <h1>Makeup Looks for Every Aesthetic</h1>
        <p>Find makeup looks for every mood, outfit, and occasion.</p>
      </header>

      <form class="filter-form" method="GET" action="/" aria-label="Filter makeup looks">
        <label for="category">
          Category
          <select id="category" name="category">
            <option value="">All categories</option>
            {{categoryOptions}}
          </select>
        </label>
        <label for="difficulty">
          Difficulty
          <select id="difficulty" name="difficulty">
            <option value="">All difficulties</option>
            {{difficultyOptions}}
          </select>
        </label>
        <div class="filter-actions">
          <button type="submit">Search</button>
          <a href="/" role="button" class="secondary">Clear</a>
        </div>
      </form>

      <p class="result-summary">{{resultSummary}}</p>

      <section class="look-grid" aria-label="Makeup looks">
        {{looks}}
      </section>
    </main>
  </body>
</html>
